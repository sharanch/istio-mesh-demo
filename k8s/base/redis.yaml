apiVersion: v1
kind: ServiceAccount
metadata:
  name: redis
  namespace: mesh-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mesh-demo
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      serviceAccountName: redis
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        readinessProbe:
          tcpSocket:
            port: 6379
        livenessProbe:
          tcpSocket:
            port: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: mesh-demo
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
    name: tcp-redis