apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mesh-demo
  labels:
    app: frontend
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: istio-mesh-demo/frontend:latest
        imagePullPolicy: Never
        env:
        - name: BACKEND_URL
          value: "http://backend:8001"
        ports:
        - containerPort: 8000
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mesh-demo
spec:
  selector:
    app: frontend
  ports:
  - port: 8000
    targetPort: 8000
    name: http
