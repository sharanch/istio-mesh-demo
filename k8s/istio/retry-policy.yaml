apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: backend
  namespace: mesh-demo
spec:
  hosts:
  - backend
  http:
  - retries:
      attempts: 3
      perTryTimeout: 5s
      retryOn: gateway-error,connect-failure,retriable-4xx
    route:
    - destination:
        host: backend
        subset: v1
      weight: 100